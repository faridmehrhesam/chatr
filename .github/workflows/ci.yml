name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dotnet tools
        run: dotnet tool restore

      - name: Stamp cloud build version
        run: dotnet nbgv cloud -a

      - name: Begin SonarCloud analysis
        if: github.actor != 'dependabot[bot]'
        env:
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
          SONAR_ORG: ${{ secrets.SONAR_ORG }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet sonarscanner begin \
            /k:"$SONAR_PROJECT_KEY" \
            /o:"$SONAR_ORG" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml" \
            /d:sonar.qualitygate.wait=true \
            /d:sonar.coverage.exclusions="**/Program.cs,**/AppHost.cs,**/*.razor,src/ServiceDefaults/Extensions.cs"

      - name: Format
        id: format
        run: dotnet format --verify-no-changes
        continue-on-error: true

      - name: Build
        id: build
        run: dotnet build --no-incremental
        continue-on-error: true

      - name: Test
        id: tests
        run: dotnet test --no-build --collect:"XPlat Code Coverage" --results-directory ./coverage -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover
        continue-on-error: true

      - name: End SonarCloud analysis
        if: github.actor != 'dependabot[bot]'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"

      - name: Fail if any step failed
        if: steps.format.outcome == 'failure' || steps.build.outcome == 'failure' || steps.tests.outcome == 'failure'
        run: exit 1

  tag:
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dotnet tools
        run: dotnet tool restore

      - name: Stamp cloud build version
        run: dotnet nbgv cloud -a

      - name: Tag version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          dotnet nbgv tag
          TAG=$(git tag --points-at HEAD)
          if ! git ls-remote --exit-code --tags origin "refs/tags/$TAG"; then
            git push origin "refs/tags/$TAG"
          fi
